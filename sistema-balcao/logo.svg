<svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g" x1="70" y1="12" x2="130" y2="188" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#ffb347"/>
      <stop offset="45%"  stop-color="#f97316"/>
      <stop offset="100%" stop-color="#c23a00"/>
    </linearGradient>
  </defs>

  <!-- Outer complete ring -->
  <circle cx="100" cy="100" r="88" stroke="url(#g)" stroke-width="15" fill="none"/>

  <!--
    Middle arc: 300° sweep, gap from 8 o'clock → 6 o'clock (lower-left)
    8 o'clock = SVG 150° → (43.7, 132.5)
    6 o'clock = SVG 90°  → (100, 165)
    Clockwise large arc from 150° to 90°
  -->
  <path d="M 43.7 132.5 A 65 65 0 1 1 100 165"
        stroke="url(#g)" stroke-width="13" stroke-linecap="round" fill="none"/>

  <!--
    Inner arc: 300° sweep, gap from 8 o'clock → 6 o'clock
    8 o'clock = SVG 150° → (63.6, 121)
    6 o'clock = SVG 90°  → (100, 142)
  -->
  <path d="M 63.6 121 A 42 42 0 1 1 100 142"
        stroke="url(#g)" stroke-width="11" stroke-linecap="round" fill="none"/>

  <!-- Center dot -->
  <circle cx="100" cy="100" r="13" fill="url(#g)"/>
</svg>
