<svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g" x1="100" y1="10" x2="100" y2="190" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#ffaa40"/>
      <stop offset="50%"  stop-color="#f97316"/>
      <stop offset="100%" stop-color="#c94000"/>
    </linearGradient>
  </defs>

  <!-- Outer complete ring -->
  <circle cx="100" cy="100" r="88" stroke="url(#g)" stroke-width="15" fill="none"/>

  <!--
    Middle ring — two separate arcs forming ( )
    Left  arc: 10 o'clock (210°) CCW → 7 o'clock (120°)  — passes through 9 o'clock
    Right arc: 2 o'clock  (330°) CW  → 5 o'clock  (60°)  — passes through 3 o'clock
  -->
  <path d="M 43.7 67.5 A 65 65 0 0 0 67.5 156.3"
        stroke="url(#g)" stroke-width="13" stroke-linecap="round" fill="none"/>
  <path d="M 156.3 67.5 A 65 65 0 0 1 132.5 156.3"
        stroke="url(#g)" stroke-width="13" stroke-linecap="round" fill="none"/>

  <!--
    Inner ring — same pattern, smaller radius
    Left  arc: 10 o'clock (210°) CCW → 7 o'clock (120°)
    Right arc: 2 o'clock  (330°) CW  → 5 o'clock  (60°)
  -->
  <path d="M 63.6 79 A 42 42 0 0 0 79 136.4"
        stroke="url(#g)" stroke-width="11" stroke-linecap="round" fill="none"/>
  <path d="M 136.4 79 A 42 42 0 0 1 121 136.4"
        stroke="url(#g)" stroke-width="11" stroke-linecap="round" fill="none"/>

  <!-- Center dot -->
  <circle cx="100" cy="100" r="13" fill="url(#g)"/>
</svg>
